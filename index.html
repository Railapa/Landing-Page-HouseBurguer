<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Burguer</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/media.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header id="home">
        <div class="logo">
            <img src="./imagens/logo.png" alt="">
        </div>

        <nav class="navbar show" id="navbar">
            <a href="#home">Início</a>
            <a href="#menu">Nosso Menu</a>
            <a href="#avaliacoes">Avaliações</a>
            <a class="linkPedido" id="linkPedido" href="#pedido">Fazer Pedido</a>
        </nav>

        <button class="btn btn_mobile" id="btn_mobile">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <main class="apresentacao">
        <div class="apresentacao-header">
            <h1>
                Sabor que <span class="texto_destaque">Transcende</span>
            </h1>
            <p>
                Cada hambúrguer é uma experiência culinária única, elaborada com ingredientes nobres e técnicas artesanais.
            </p>
        </div>

        <div class="apresentacao-main">
            <div class="apresentacao-img">
                <img src="./imagens/img-main.jpg" alt="">
            </div>

            <div class="apresentacao_botoes">
                <a class="link_pedido" href="">Fazer Pedido</a>
                <a class="link_menu" href="">Explorar Menu</a>
            </div>
        </div>

        <div class="apresentacao_descricao">
            <div class="descricao_clientes">
                <h2>500 +</h2>
                <p>clientes</p>
            </div>
            <div class="descricao_avaliacao">
                <h2>4.9 <i class="fa-solid fa-star"></i></h2>
                <p>Avaliação</p>
            </div>
            <div class="descricao_receitas">
                <h2>15 +</h2>
                <p>Receitas</p>
            </div>
        </div>
    </main>
    <script src="./script/script.js"></script>
</body>

</html>
